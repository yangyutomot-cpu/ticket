<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>请稍后</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
  background: #f2f3f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 90%;
  max-width: 420px;
  background: white;
  border-radius: 20px;
  padding: 40px 20px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.08);
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #ddd;
  border-top: 4px solid #ff4d4f;
  border-radius: 50%;
  margin: 0 auto 20px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.title {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 10px;
}

.desc {
  font-size: 14px;
  color: #888;
}

.success {
  color: #52c41a;
}

.prank {
  color: #fa541c;
  font-size: 22px;
  font-weight: bold;
}

</style>
</head>

<body>

<div class="card">
  <div class="spinner" id="spinner"></div>
  <div class="title" id="title">正在购票...</div>
  <div class="desc" id="desc">请稍候，正在锁定座位</div>
</div>

<script>

// 第一阶段 → 购票中
setTimeout(() => {
  document.getElementById("title").innerText = "正在支付...";
  document.getElementById("desc").innerText = "请勿关闭页面";
}, 1500);

// 第二阶段 → 成功（让人信）
setTimeout(() => {
  document.getElementById("spinner").style.display = "none";
  document.getElementById("title").innerText = "购票成功!";
  document.getElementById("title").className = "title success";
  document.getElementById("desc").innerText = "订单已生成，正在出票";
}, 3000);

// 第三阶段 → 反转（暴击）
setTimeout(() => {
  document.getElementById("title").innerText = "愚人节快乐🥴";
  document.getElementById("title").className = "prank";
  document.getElementById("desc").innerText = "看来你有这个计划 😏";
}, 5000);

</script>

</body>
</html>
